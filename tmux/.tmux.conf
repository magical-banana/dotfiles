set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# --- General Settings ---
# `tmux-256color` is the modern default — supports italics + undercurl.
# The override pattern uses *256col* so it matches both xterm-256color and
# tmux-256color outer terminals (and anything else with 256-color support).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on               # Enable mouse for scrolling and resizing
set -g history-limit 100000   # Big history buffer for logs
set -g base-index 1           # Start window numbering at 1 (easier to reach)
set -g pane-base-index 1      # Match base-index for panes (consistency with windows)
set -g renumber-windows on    # Automatically renumber windows when one is closed
set -sg escape-time 0         # No delay on ESC — fixes vim mode-switch lag
set -g focus-events on        # Forward focus events to vim/nvim ('autoread')

# --- Keybindings ---
# Change prefix from Ctrl-b to Ctrl-a (easier on the pinky)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config without leaving tmux
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# --- Gotham Aesthetics ---
# Palette reference (whatyouhide/vim-gotham):
#   base0  #0c1014  bg          base6  #99d1ce  fg
#   base1  #11151c  bg-line     base7  #d3ebe9  fg-bright
#   base2  #091f2e  ui          cyan   #33859e  active accent
#   base3  #0a3749  selection   yellow #edb443  warning / current-window
set -g status-style 'bg=#0c1014 fg=#99d1ce'
set -g pane-border-style 'fg=#091f2e'
set -g pane-active-border-style 'fg=#33859e'   # cyan — Gotham active accent

# Highlight active window in the status bar
set-window-option -g window-status-current-style 'bg=#0a3749,fg=#edb443'

# Inactive windows blend into the bar; messages use cyan so prompts stand out.
set-window-option -g window-status-style 'fg=#599cab'
set -g message-style 'bg=#091f2e fg=#33859e'

# Define the plugin path explicitly
set -g @plugin_path '~/.tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Save sessions
set -g @plugin 'tmux-plugins/tmux-continuum' # Auto-save every 15 mins

# Continuum — without these two, tmux-continuum loads but does nothing useful.
set -g @continuum-restore 'on'        # restore last session on tmux start
set -g @continuum-save-interval '15'  # minutes between automatic saves

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'